name: Build MMEdit

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        qt_version: ["6.5", "6.8", "6.10"]

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          modules: 'qt5compat'
          cache: true

      - name: Setup Linux
        run: |
          if [[ "${{ matrix.qt_version }}" == "6.10" ]]; then
            echo "EXTRA_PLATFORM_PLUGINS=libqwayland.so" >> "$GITHUB_ENV"
          else
            echo "EXTRA_PLATFORM_PLUGINS=libqwayland-generic.so" >> "$GITHUB_ENV"
          fi
          sudo apt-get install libxkbcommon-dev libxkbcommon-x11-0 fuse libxcb-cursor-dev libcups2-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Upload AppImage
        uses: actions/upload-artifact@v6
        with:
          name: MMEdit-Linux-Qt${{ matrix.qt_version }}-AppImage
          path: ${{ github.workspace }}/build/NotepadNext*.AppImage